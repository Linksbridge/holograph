name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
          
      - name: Build designer (editor) application
        run: |
          cd packages/designer
          npm ci
          npm run build
        env:
          REACT_APP_DATABASE_CONNECTION_STRING: ${{ secrets.DATABASE_CONNECTION_STRING }}
          REACT_APP_DEFAULT_GLOBAL_SETTINGS_URL: https://1000monkeys-cafudffjbwbjc8gu.westus2-01.azurewebsites.net/api/settings/global
          REACT_APP_DATABASE_SCHEMA_URL: https://1000monkeys-cafudffjbwbjc8gu.westus2-01.azurewebsites.net/api/database/schema
          
      - name: Prepare build output for deployment
        run: |
          echo "Checking build output..."
          ls -la packages/designer/build/
          echo "Copying build output to deployment location..."
          cp -r packages/designer/build/* packages/designer/
          ls -la packages/designer/
        
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_GROUND_07DA2DB1E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "/packages/designer" # App source code path - designer/editor only
          api_location: "" # Api source code path - optional
          output_location: "" # Files are already in the app_location root
          skip_app_build: true # Skip Azure's auto-build since we build explicitly above
          ###### End of Repository/Build Configurations ######
        env:
          DATABASE_CONNECTION_STRING: ${{ secrets.DATABASE_CONNECTION_STRING }}

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_GROUND_07DA2DB1E }}
          action: "close"
